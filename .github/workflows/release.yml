name: Build IPK and APK

on:
  push:
    branches:
      - master
    paths:
      - 'Makefile'
  workflow_dispatch:

jobs:
  build:
    name: Build Package - ${{ matrix.sdk_ver }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - sdk_ver: "24.10"
            sdk_url: "https://downloads.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          - sdk_ver: "25.12"
            sdk_url: "https://downloads.openwrt.org/releases/25.12.0/targets/x86/64/openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up build environment
        run: |
          sudo -E apt-get update > /dev/null 2>&1
          sudo -E apt-get install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget zstd > /dev/null 2>&1
          PKG_NAME=$(basename ${{ github.repository }})
          PKG_VERSION=$(grep -oP 'PKG_VERSION:=\K.*' Makefile)
          echo "PKG_VERSION=$PKG_VERSION" >> $GITHUB_ENV
          echo "PKG_NAME=$PKG_NAME" >> $GITHUB_ENV

      - name: Set up resources
        run: |
          curl -s -L ${{ matrix.sdk_url }} -o sdk.tar.zst
          mkdir sdk
          tar -I zstd -xf sdk.tar.zst -C sdk --strip-components=1
          git clone -q https://github.com/${{ github.repository }} sdk/package/${PKG_NAME}
          [ -f sdk/package/${PKG_NAME}/root/usr/bin/tinyfm.sh ] && chmod +x sdk/package/${PKG_NAME}/root/usr/bin/tinyfm.sh || true

      - name: Set up SDK feeds
        run: |
          cd sdk
          ./scripts/feeds update -a > /dev/null 2>&1
          ./scripts/feeds install -a > /dev/null 2>&1

      - name: Configure & compile
        run: |
          cd sdk
          make defconfig > /dev/null 2>&1
          make package/${PKG_NAME}/{clean,compile} -j$(nproc)
          PKG_PATH=$(find bin/packages/ -name "${PKG_NAME}*.[ia]pk" | head -n 1)
          echo "PKG_PATH=sdk/$PKG_PATH" >> $GITHUB_ENV

      - name: Generate release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: Release ${{ env.PKG_VERSION }}
          tag_name: ${{ env.PKG_VERSION }}
          files: ${{ env.PKG_PATH }}
          body: |
            Build for OpenWrt ${{ matrix.sdk_ver }}
            Format: ${{ matrix.sdk_ver == '25.12' && 'APK' || 'IPK' }}
            Toolchain: ${{ matrix.sdk_ver == '25.12' && 'GCC 14.3.0' || 'GCC 13.3.0' }}
